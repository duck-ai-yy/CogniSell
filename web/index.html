<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CogniSell — AI Relationship OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">CogniSell</span>
      <span class="brand-sep"></span>
      <span class="brand-tag">Relationship OS</span>
    </div>
    <div class="topbar-status">
      Watching <strong id="rel-count">0</strong> relationships
    </div>
  </header>

  <main class="stage">
    <section class="panel-left">
      <div class="graph-area">
        <div id="cy"></div>
        <div class="graph-legend" id="graph-legend">
          <span class="leg-item"><i class="leg-line proposed"></i>Proposed</span>
          <span class="leg-item"><i class="leg-line confirmed"></i>Confirmed</span>
          <span class="leg-item"><i class="leg-line corrected"></i>Corrected</span>
          <span class="leg-item"><i class="leg-dot cold"></i>Cold (&gt;90d)</span>
          <span class="leg-item"><i class="leg-dot updated"></i>New info</span>
        </div>
        <aside class="detail-panel" id="detail-panel" hidden>
          <button class="detail-close" id="detail-close" aria-label="Close">&times;</button>
          <div id="detail-content"></div>
        </aside>
      </div>
    </section>

    <section class="panel-right">
      <div class="right-scroll" id="right-scroll">
        <div class="empty-state" id="empty-state">
          <svg class="empty-icon" width="56" height="56" viewBox="0 0 56 56" fill="none">
            <circle cx="28" cy="28" r="27" stroke="#e5e5e5" stroke-width="2"/>
            <path d="M20 24l5 5-5 5M28 34h8" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="empty-title">Ready when you are</p>
          <p class="empty-sub">Scan a business card, speak a command, or just type.</p>
        </div>

        <div class="activity-stream" id="activity-stream" hidden>
          <div class="stream-header">
            <span class="stream-pulse"></span>
            <span>Agent Activity</span>
          </div>
          <div class="stream-items" id="stream-items"></div>
        </div>

        <div class="cards-area" id="cards-area"></div>
      </div>

      <div class="input-bar">
        <button class="input-icon" id="add-person-btn" title="Add person manually">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="input-icon" id="scan-btn" title="Scan business card">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="input-icon" id="mic-btn" title="Voice input">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="7" y="2" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 10c0 3.3 2.7 6 6 6s6-2.7 6-6M10 16v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <input type="text" class="input-text" id="input-text" placeholder="Type a command..." />
        <button class="input-send" id="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 9h12M11 5l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="upload-modal" hidden>
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <h3 class="modal-title">Scan Business Card</h3>
      <div class="upload-area" id="upload-area">
        <div id="image-preview-container">
          <img src="/static/sample_real.png" alt="Sample Business Card" class="sample-image" id="preview-img" />
        </div>
        <div id="camera-container" hidden>
          <video id="camera-video" autoplay playsinline class="sample-image"></video>
          <canvas id="camera-canvas" hidden></canvas>
        </div>
        <p class="upload-hint" id="upload-hint">Using sample image. Click 'Use Camera' or 'Upload Image' to scan a real card.</p>
      </div>
      <div class="modal-actions" style="justify-content: space-between;">
        <input type="file" id="file-input" accept="image/*" style="display: none;" />
        <button class="btn btn-ghost" id="upload-btn">Upload Image</button>
        <button class="btn btn-ghost" id="toggle-camera-btn">Use Camera</button>
        <button class="btn btn-primary" id="start-scan-btn">Start Scan</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="/static/app.js?v=3"></script>
</body>
</html>
